<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Indian Bike Race - Bullet Drift</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: Arial; }
canvas { display: block; }
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #ffcc00;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px #000;
}
#speed {
  position: absolute;
  top: 20px;
  right: 20px;
  color: #ff3300;
  font-size: 24px;
  font-weight: bold;
}
#controls {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
}
button {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid #ffcc00;
  background: rgba(255,165,0,0.4);
  color: white;
  font-size: 35px;
  font-weight: bold;
}
button:active { background: rgba(255,200,0,0.8); transform: scale(0.9); }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="speed">Speed: 0</div>
<canvas id="game"></canvas>
<div id="controls">
  <button id="left">◀</button>
  <button id="right">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bikeX = canvas.width / 2;
let bikeY = canvas.height - 100;
let speed = 6;
let score = 0;
let roadOffset = 0;
let enemies = [];
let tilt = 0;

// Indian Bike बनाने का Code - Bullet Style
function drawBike(x, y, tiltAngle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tiltAngle * 0.08);

  // Bike Body - Red Bullet
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(-15, 30);
  ctx.lineTo(-10, -40);
  ctx.lineTo(10, -40);
  ctx.lineTo(15, 30);
  ctx.closePath();
  ctx.fill();

  // Fuel Tank
  ctx.fillStyle = '#990000';
  ctx.fillRect(-12, -25, 24, 18);

  // Seat - Black
  ctx.fillStyle = '#222';
  ctx.fillRect(-14, 5, 28, 20);

  // Handle
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-18, -42);
  ctx.lineTo(18, -42);
  ctx.stroke();

  // Headlight
  ctx.fillStyle = '#ffff99';
  ctx.beginPath();
  ctx.arc(0, -45, 8, 0, Math.PI*2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(0, 40, 18, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -35, 16, 0, Math.PI*2);
  ctx.fill();

  // Rim
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 40, 12, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -35, 10, 0, Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

// Enemy - Truck/Bike
function drawEnemy(x, y) {
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(x-20, y-40, 40, 80);
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x, y+30, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y-30, 8, 0, Math.PI*2);
  ctx.fill();
}

function drawRoad() {
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(canvas.width/2 - 120, 0, 240, canvas.height);

  ctx.strokeStyle = 'yellow';
  ctx.lineWidth = 6;
  ctx.setLineDash([30, 30]);
  roadOffset += speed;
  if(roadOffset > 60) roadOffset = 0;
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, roadOffset);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);
}

function spawnEnemy() {
  if(Math.random() < 0.025) {
    let x = canvas.width/2 + (Math.random() - 0.5) * 160;
    enemies.push({x: x, y: -100});
  }
}

function checkCollision() {
  for(let i = enemies.length-1; i >= 0; i--) {
    let e = enemies[i];
    if(Math.abs(bikeX - e.x) < 35 && Math.abs(bikeY - e.y) < 70) {
      return true;
    }
  }
  return false;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  spawnEnemy();

  for(let i = enemies.length-1; i >= 0; i--) {
    enemies[i].y += speed + 2;
    drawEnemy(enemies[i].x, enemies[i].y);
    if(enemies[i].y > canvas.height + 100) {
      enemies.splice(i, 1);
      score += 10;
    }
  }

  if(keys.left) tilt = -4;
  else if(keys.right) tilt = 4;
  else tilt *= 0.8;

  drawBike(bikeX, bikeY, tilt);

  document.getElementById('score').innerText = 'Score: ' + Math.floor(score);
  document.getElementById('speed').innerText = 'Speed: ' + speed.toFixed(1) + 'x';

  if(checkCollision()) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 45px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CRASH!', canvas.width/2, canvas.height/2);
    ctx.font = '25px Arial';
    ctx.fillText('Score: ' + Math.floor(score), canvas.width/2, canvas.height/2 + 50);
    ctx.fillText('Refresh to Restart', canvas.width/2, canvas.height/2 + 85);
    return;
  }

  score += 0.1;
  if(Math.floor(score) % 400 < 1) speed += 0.4;

  requestAnimationFrame(gameLoop);
}

let keys = {left: false, right: false};
document.getElementById('left').ontouchstart = () => {keys.left = true; bikeX -= 22};
document.getElementById('left').ontouchend = () => keys.left = false;
document.getElementById('right').ontouchstart = () => {keys.right = true; bikeX += 22};
document.getElementById('right').ontouchend = () => keys.right = false;

setInterval(() => {
  if(bikeX < canvas.width/2 - 100) bikeX = canvas.width/2 - 100;
  if(bikeX > canvas.width/2 + 100) bikeX = canvas.width/2 + 100;
}, 10);

window.onload = function() { gameLoop(); }
</script>
</body>
</html>
