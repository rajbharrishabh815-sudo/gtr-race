<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GTR R34 Tokyo Drift</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: Arial; }
canvas { display: block; }
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px #000;
}
#speed {
  position: absolute;
  top: 20px;
  right: 20px;
  color: #ff3300;
  font-size: 24px;
  font-weight: bold;
}
#controls {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
}
button {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid #fff;
  background: rgba(255,50,50,0.4);
  color: white;
  font-size: 35px;
  font-weight: bold;
}
button:active { background: rgba(255,100,100,0.8); transform: scale(0.9); }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="speed">Speed: 0</div>
<canvas id="game"></canvas>
<div id="controls">
  <button id="left">◀</button>
  <button id="right">▶</button>
</div>
