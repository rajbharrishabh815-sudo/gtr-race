<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Car Racing</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
text-align:center;
}
#menu,#gameOver{
position:absolute;
width:100%;
top:35%;
}
button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
}
canvas{
display:none;
background:skyblue;
}
#info{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}
</style>
</head>
<body>

<div id="menu">
<h1>🏎️ 3D Car Racing</h1>
<p>⬅️ Left = Baayi taraf<br>➡️ Right = Daayi taraf</p>
<button onclick="startGame()">START</button>
</div>

<div id="info"></div>

<canvas id="game" width="400" height="700"></canvas>

<div id="gameOver" style="display:none">
<h1>GAME OVER</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let running=false;

let player={
lane:1,
y:580,
w:60,
h:100
};

let enemies=[];

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
running=true;

setInterval(()=>{
if(running){
enemies.push({
lane:Math.floor(Math.random()*3),
y:-120
});
}
},1200);

gameLoop();
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft" && player.lane>0){
player.lane--;
}
if(e.key==="ArrowRight" && player.lane<2){
player.lane++;
}
});

function laneX(lane){
return [90,170,250][lane];
}

function drawRoad(){
ctx.fillStyle="green";
ctx.fillRect(0,0,400,700);

ctx.fillStyle="#555";
ctx.beginPath();
ctx.moveTo(50,700);
ctx.lineTo(350,700);
ctx.lineTo(250,0);
ctx.lineTo(150,0);
ctx.fill();

ctx.strokeStyle="white";
ctx.lineWidth=4;

for(let i=0;i<20;i++){
let y=(i*50 + score*5)%700;
ctx.beginPath();
ctx.moveTo(200,y);
ctx.lineTo(200,y+25);
ctx.stroke();
}
}

function drawPlayer(){
let x=laneX(player.lane);

ctx.fillStyle="blue";
ctx.fillRect(x,player.y,player.w,player.h);

ctx.fillStyle="white";
ctx.fillRect(x+10,player.y+10,15,20);
ctx.fillRect(x+35,player.y+10,15,20);
}

function drawEnemies(){

for(let i=0;i<enemies.length;i++){

let e=enemies[i];

e.y+=7;

let x=laneX(e.lane);

ctx.fillStyle="red";
ctx.fillRect(x,e.y,60,100);

if(
x < laneX(player.lane)+60 &&
x+60 > laneX(player.lane) &&
e.y < player.y+100 &&
e.y+100 > player.y
){
gameOver();
}

if(e.y>750){
enemies.splice(i,1);
score++;
}
}
}

function gameOver(){
running=false;
canvas.style.display="none";
document.getElementById("gameOver").style.display="block";
document.getElementById("finalScore").innerText=
"Score: "+score;
}

function gameLoop(){

if(!running) return;

ctx.clearRect(0,0,400,700);

drawRoad();
drawPlayer();
drawEnemies();

document.getElementById("info").innerHTML=
"Score: "+score+"<br>⬅️ Left | ➡️ Right";

requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
