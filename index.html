<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Bike Race - Bullet</title>
<style>
body{margin:0;background:#000;overflow:hidden}
canvas{display:block}
#score{position:absolute;top:20px;left:20px;color:#ffcc00;font:24px bold Arial;text-shadow:2px 2px 4px #000}
#speed{position:absolute;top:20px;right:20px;color:#ff3300;font:24px bold Arial;text-shadow:2px 2px 4px #000}
#controls{position:fixed;bottom:30px;width:100%;display:flex;justify-content:space-between;padding:0 40px}
button{width:85px;height:85px;border-radius:50%;border:3px solid #ffcc00;background:rgba(255,165,0,0.5);color:#fff;font:32px bold Arial}
button:active{background:rgba(255,200,0,0.8);transform:scale(0.9)}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="speed">Speed: 6</div>
<canvas id="c"></canvas>
<div id="controls">
<button id="l">◀</button>
<button id="r">▶</button>
</div>
<script>
var c=document.getElementById('c'),x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
var bx=c.width/2,by=c.height-100,s=6,sc=0,ro=0,e=[],t=0,k={l:0,r:0};

function bike(px,py,ang){
x.save();x.translate(px,py);x.rotate(ang*0.08);
x.fillStyle='#c00';x.beginPath();x.moveTo(-12,30);x.lineTo(-10,-40);x.lineTo(10,-40);x.lineTo(12,30);x.closePath();x.fill();
x.fillStyle='#900';x.fillRect(-10,-25,20,15);
x.fillStyle='#222';x.fillRect(-12,5,24,18);
x.strokeStyle='#444';x.lineWidth=3;x.beginPath();x.moveTo(-15,-42);x.lineTo(15,-42);x.stroke();
x.fillStyle='#ff9';x.beginPath();x.arc(0,-45,6,0,6.28);x.fill();
x.fillStyle='#111';x.beginPath();x.arc(0,40,15,0,6.28);x.fill();x.beginPath();x.arc(0,-35,12,0,6.28);x.fill();
x.strokeStyle='#666';x.lineWidth=2;x.beginPath();x.arc(0,40,10,0,6.28);x.stroke();x.beginPath();x.arc(0,-35,8,0,6.28);x.stroke();
x.restore();
}

function road(){
x.fillStyle='#3a3a3a';x.fillRect(c.width/2-100,0,200,c.height);
x.strokeStyle='yellow';x.lineWidth=5;x.setLineDash([25,25]);
ro+=s;if(ro>50)ro=0;x.beginPath();x.moveTo(c.width/2,ro);x.lineTo(c.width/2,c.height);x.stroke();x.setLineDash([]);
}

function loop(){
x.clearRect(0,0,c.width,c.height);
road();
if(Math.random()<0.02)e.push({x:c.width/2+(Math.random()-0.5)*140,y:-80});
for(var i=e.length-1;i>=0;i--){
e[i].y+=s+2;x.fillStyle='#f60';x.fillRect(e[i].x-18,e[i].y-35,36,70);
x.fillStyle='#111';x.beginPath();x.arc(e[i].x,e[i].y+30,8,0,6.28);x.fill();x.beginPath();x.arc(e[i].x,e[i].y-30,6,0,6.28);x.fill();
if(e[i].y>c.height+80){e.splice(i,1);sc+=10;}
}
if(k.l){bx-=20;t=-3;}
if(k.r){bx+=20;t=3;}
t*=0.85;if(bx<c.width/2-90)bx=c.width/2-90;if(bx>c.width/2+90)bx=c.width/2+90;
bike(bx,by,t);
document.getElementById('score').innerText='Score: '+Math.floor(sc);
document.getElementById('speed').innerText='Speed: '+s.toFixed(1);
for(i=0;i<e.length;i++)if(Math.abs(bx-e[i].x)<30&&Math.abs(by-e[i].y)<60){x.fillStyle='rgba(0,0,0,0.8)';x.fillRect(0,0,c.width,c.height);x.fillStyle='#ff0';x.font='bold 40px Arial';x.textAlign='center';x.fillText('CRASH!',c.width/2,c.height/2);x.font='22px Arial';x.fillText('Refresh to Restart',c.width/2,c.height/2+40);return;}
sc+=0.1;if(Math.floor(sc)%300==0)s+=0.3;
requestAnimationFrame(loop);
}

document.getElementById('l').ontouchstart=()=>k.l=1;
document.getElementById('l').ontouchend=()=>k.l=0;
document.getElementById('r').ontouchstart=()=>k.r=1;
document.getElementById('r').ontouchend=()=>k.r=0;

window.onload=function(){loop()};
</script>
</body>
</html>
