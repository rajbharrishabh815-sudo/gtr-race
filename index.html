<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Car Racing Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial;
text-align:center;
color:white;
}

#menu,#gameover{
position:absolute;
width:100%;
top:40%;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
display:none;
background:#555;
}
</style>
</head>
<body>

<div id="menu">
<h1>🏎 Car Racing Game</h1>
<button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="400" height="700"></canvas>

<div id="gameover" style="display:none">
<h1>Game Over</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let running=false;

const player={
x:170,
y:580,
w:60,
h:100,
speed:8
};

let enemies=[];

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
running=true;

setInterval(()=>{
if(running){
enemies.push({
x:[70,170,270][Math.floor(Math.random()*3)],
y:-120,
w:60,
h:100
});
}
},1200);

gameLoop();
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.x-=player.speed*5;
if(e.key==="ArrowRight") player.x+=player.speed*5;

if(player.x<50) player.x=50;
if(player.x>290) player.x=290;
});

function drawRoad(){
ctx.fillStyle="#666";
ctx.fillRect(50,0,300,700);

ctx.strokeStyle="white";
ctx.lineWidth=5;

for(let y=0;y<700;y+=40){
ctx.beginPath();
ctx.moveTo(150,y);
ctx.lineTo(150,y+20);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(250,y);
ctx.lineTo(250,y+20);
ctx.stroke();
}
}

function drawPlayer(){
ctx.fillStyle="lime";
ctx.fillRect(player.x,player.y,player.w,player.h);
}

function drawEnemies(){
ctx.fillStyle="red";

for(let i=0;i<enemies.length;i++){
let e=enemies[i];

e.y+=6;

ctx.fillRect(e.x,e.y,e.w,e.h);

if(
player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.y+player.h>e.y
){
gameOver();
}

if(e.y>700){
enemies.splice(i,1);
score++;
}
}
}

function gameOver(){
running=false;
canvas.style.display="none";
document.getElementById("gameover").style.display="block";
document.getElementById("finalScore").innerText=
"Score: "+score;
}

function gameLoop(){
if(!running) return;

ctx.clearRect(0,0,400,700);

drawRoad();
drawPlayer();
drawEnemies();

ctx.fillStyle="white";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,10,30);

requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
