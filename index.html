<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GTR Racing Pro 2D</title>
<style>
/* ================== CSS SECTION 1 ================== */
* { margin:0; padding:0; overflow:hidden; user-select:none; box-sizing:border-box; }
body { background:#0a0a0a; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Arial',sans-serif; }

/* ================== CSS SECTION 2 ================== */
canvas { border:5px solid #ffcc00; box-shadow:0 0 40px #ffcc00; background:#2a2a2a; border-radius:10px; }

/* ================== CSS SECTION 3 ================== */
#ui { position:absolute; top:20px; left:25px; color:#ffcc00; font-size:24px; font-weight:bold; text-shadow:0 0 15px #ffcc00; z-index:10; }
#speed { position:absolute; top:20px; right:25px; color:#00ffff; font-size:24px; font-weight:bold; text-shadow:0 0 15px #00ffff; z-index:10; }
#nitro { position:absolute; top:55px; right:25px; color:#ff00ff; font-size:18px; font-weight:bold; }

/* ================== CSS SECTION 4 ================== */
#menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.98); padding:50px; border:5px solid #ffcc00; border-radius:20px; text-align:center; color:#ffcc00; z-index:100; }
#menu h1 { font-size:50px; margin-bottom:25px; text-shadow:0 0 25px #ffcc00; animation:glow 2s infinite; }
@keyframes glow { 0%,100%{text-shadow:0 0 25px #ffcc00;} 50%{text-shadow:0 0 40px #ffcc00;} }

/* ================== CSS SECTION 5 ================== */
#menu button { background:linear-gradient(45deg,#ffcc00,#ffaa00); color:#000; border:none; padding:16px 40px; font-size:22px; font-weight:bold; border-radius:10px; cursor:pointer; margin:12px; transition:0.3s; }
#menu button:hover { transform:scale(1.1); box-shadow:0 0 30px #ffcc00; background:#fff; }

/* ================== CSS SECTION 6 ================== */
#garage { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.98); padding:40px; border:4px solid #00ffff; border-radius:20px; color:#00ffff; display:none; z-index:99; }
#garage h2 { text-align:center; margin-bottom:20px; font-size:35px; }
.car-option { display:inline-block; width:80px; height:120px; margin:10px; border:3px solid #555; cursor:pointer; border-radius:8px; }
.car-option:hover { border-color:#ffcc00; transform:scale(1.1); }

/* ================== CSS SECTION 7 ================== */
.hidden { display:none!important; }
#help { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#aaa; font-size:15px; background:rgba(0,0,0,0.7); padding:8px 20px; border-radius:10px; }

/* ================== CSS SECTION 8 ================== */
#levelUp { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#00ff00; font-size:60px; font-weight:bold; text-shadow:0 0 30px #00ff00; display:none; z-index:50; animation:levelAnim 1s; }
@keyframes levelAnim { 0%{transform:translate(-50%,-50%) scale(0);} 50%{transform:translate(-50%,-50%) scale(1.3);} 100%{transform:translate(-50%,-50%) scale(1);} }
</style>
</head>
<body>
<div id="ui">Score: 0 | Life: 3 | Level: 1</div>
<div id="speed">Speed: 0 KM/H</div>
<div id="nitro">NITRO: 100%</div>
<div id="help">← → Move | SPACE Brake | SHIFT Nitro | G Pause | R Restart</div>
<div id="levelUp">LEVEL UP!</div>

<div id="menu">
    <h1>🏁 GTR RACING PRO 🏁</h1>
    <p style="color:#fff; margin-bottom:25px; font-size:18px;">Car चलाओ, Accident से बचो, Nitro मारो!</p>
    <button onclick="startGame()">START RACE</button>
    <button onclick="openGarage()">GARAGE</button>
    <button onclick="showHighScore()">HIGH SCORE</button>
</div>

<div id="garage">
    <h2>CHOOSE YOUR CAR</h2>
    <div id="carList"></div>
    <button onclick="closeGarage()" style="margin-top:20px; width:100%;">BACK</button>
</div>

<canvas id="game" width="400" height="700"></canvas>

<script>
// ================== JS SECTION 1: VARIABLES ==================
let canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');
let score = 0, lives = 3, level = 1, speed = 0, nitro = 100;
let gameOver = false, gameStarted = false, paused = false;
let keys = {}, audioCtx;
let cars = [], coins = [], particles = [], roadLines = [], rainDrops = [];
let carColors = ['#ff0000','#0000ff','#00ff00','#ff00ff','#ffa500','#00ffff','#ff1493','#32cd32','#ff4500','#9400d3'];
let selectedCar = 0;
let highScore = localStorage.getItem('gtrHighScore') || 0;

// ================== JS SECTION 2: AUDIO SYSTEM ==================
function initAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, dur, type='square') {
    if(!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.type = type;
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}
let bgMusicTimer = 0;
function backgroundMusic() {
    bgMusicTimer++;
    if(bgMusicTimer % 100 == 0) playSound(200 + Math.random()*100, 0.2, 'sine');
}

// ================== JS SECTION 3: PLAYER CAR ==================
let player = {
    x: 180, y: 600, w: 42, h: 72, vx: 0, speed: 5.5, maxSpeed: 9,
    invincible: 0, blink: 0, nitroActive: false,
    reset() {
        this.x = 180; this.vx = 0; score = 0; lives = 3; level = 1; speed = 0; nitro = 100;
        cars = []; coins = []; particles = []; rainDrops = [];
    },
    update() {
        if(gameOver || paused) return;
        if(keys['ArrowLeft'] && this.x > 50) this.vx = -this.speed;
        else if(keys['ArrowRight'] && this.x < canvas.width-50-this.w) this.vx = this.speed;
        else this.vx = 0;
        if(keys[' ']) speed = Math.max(0, speed-1.5);
        else {
            if(keys['Shift'] && nitro > 0) {
                this.nitroActive = true;
                speed = Math.min(this.maxSpeed + 5, speed+0.4);
                nitro -= 0.5;
                if(nitro < 0) nitro = 0;
            } else {
                this.nitroActive = false;
                speed = Math.min(this.maxSpeed + level, speed+0.15);
                if(nitro < 100) nitro += 0.1;
            }
        }
        this.x += this.vx;
        if(this.invincible > 0) this.invincible--;
        if(this.blink > 0) this.blink--;
        document.getElementById('speed').innerText = `Speed: ${Math.floor(speed*18)} KM/H`;
        document.getElementById('nitro').innerText = `NITRO: ${Math.floor(nitro)}%`;
        if(this.nitroActive) {
            createParticles(this.x+5, this.y+this.h, '#00ffff', 5);
            createParticles(this.x+this.w-5, this.y+this.h, '#00ffff', 5);
        }
    },
    draw() {
        if(this.blink % 6 < 3 && this.invincible > 0) return;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(this.x+5, this.y+5, this.w, this.h);
        ctx.fillStyle = carColors[selectedCar];
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = '#111';
        ctx.fillRect(this.x+5, this.y+15, this.w-10, 25);
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(this.x+7, this.y+17, this.w-14, 21);
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(this.x+6, this.y+this.h-10, 10, 10);
        ctx.fillRect(this.x+this.w-16, this.y+this.h-10, 10, 10);
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x-4, this.y+12, 8, 18);
        ctx.fillRect(this.x-4, this.y+48, 8, 18);
        ctx.fillRect(this.x+this.w-4, this.y+12, 8, 18);
        ctx.fillRect(this.x+this.w-4, this.y+48, 8, 18);
        ctx.fillStyle = '#ccc';
        ctx.fillRect(this.x-2, this.y+15, 4, 12);
        ctx.fillRect(this.x-2, this.y+51, 4, 12);
        ctx.fillRect(this.x+this.w-2, this.y+15, 4, 12);
        ctx.fillRect(this.x+this.w-2, this.y+51, 4, 12);
    },
    crash() {
        if(this.invincible <= 0) {
            lives--; this.invincible = 120; this.blink = 120;
            createParticles(this.x+21, this.y+36, '#ff0000', 40);
            playSound(70, 0.6, 'sawtooth');
            speed = 0;
            if(lives <= 0) endGame();
        }
    }
};

// ================== JS SECTION 4: ENEMY CARS ==================
function createCar() {
    let lane = Math.floor(Math.random()*3);
    let x = 50 + lane*100 + 29;
    let carType = Math.floor(Math.random()*carColors.length);
    cars.push({
        x: x, y: -80, w: 42, h: 72,
        vy: 3.5 + speed*0.6 + level*0.35,
        color: carColors[carType], type: carType
    });
}
function drawEnemyCar(car) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(car.x+4, car.y+4, car.w, car.h);
    ctx.fillStyle = car.color;
    ctx.fillRect(car.x, car.y, car.w, car.h);
    ctx.fillStyle = '#222';
    ctx.fillRect(car.x+7, car.y+car.h-22, car.w-14, 18);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(car.x+7, car.y+5, 9, 9);
    ctx.fillRect(car.x+car.w-16, car.y+5, 9, 9);
    ctx.fillStyle = '#000';
    ctx.fillRect(car.x-4, car.y+12, 8, 18);
    ctx.fillRect(car.x-4, car.y+48, 8, 18);
    ctx.fillRect(car.x+car.w-4, car.y+12, 8, 18);
    ctx.fillRect(car.x+car.w-4, car.y+48, 8, 18);
}

// ================== JS SECTION 5: COINS ==================
function createCoin() {
    let lane = Math.floor(Math.random()*3);
    let x = 50 + lane*100 + 41;
    coins.push({ x: x, y: -20, w: 22, h: 22, vy: 3.5 +
