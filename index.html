<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Racing Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:#222;
}
#game{
width:600px;
height:100vh;
margin:auto;
background:#555;
position:relative;
overflow:hidden;
}
.lane{
position:absolute;
width:4px;
height:100%;
background:white;
}
.car{
width:60px;
height:100px;
background:red;
position:absolute;
bottom:20px;
left:270px;
border-radius:10px;
}
.enemy{
width:60px;
height:100px;
background:blue;
position:absolute;
border-radius:10px;
}
</style>
</head>
<body>

<div id="game">
<div class="lane" style="left:100px"></div>
<div class="lane" style="left:200px"></div>
<div class="lane" style="left:300px"></div>
<div class="lane" style="left:400px"></div>
<div class="lane" style="left:500px"></div>

<div class="car" id="player"></div>
</div>

<audio id="beep">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const beep = document.getElementById("beep");

let lane = 2;
const lanes = [20,120,220,320,420,520];

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft" && lane>0){
lane--;
player.style.left=lanes[lane]+"px";
beep.play();
}
if(e.key==="ArrowRight" && lane<5){
lane++;
player.style.left=lanes[lane]+"px";
beep.play();
}
});

function createEnemy(){
let enemy=document.createElement("div");
enemy.classList.add("enemy");

let randomLane=Math.floor(Math.random()*6);
enemy.style.left=lanes[randomLane]+"px";
enemy.style.top="-100px";

game.appendChild(enemy);

let move=setInterval(()=>{
let top=parseInt(enemy.style.top);
enemy.style.top=(top+5)+"px";

if(top>window.innerHeight){
clearInterval(move);
enemy.remove();
}

let pRect=player.getBoundingClientRect();
let eRect=enemy.getBoundingClientRect();

if(
pRect.left<eRect.right &&
pRect.right>eRect.left &&
pRect.top<eRect.bottom &&
pRect.bottom>eRect.top
){
alert("Game Over!");
location.reload();
}
},20);
}

setInterval(createEnemy,1000);
</script>

</body>
</html>
