<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Master Pro</title>
<style><link rel="manifest" href="manifest.json">
body {margin:0; background:linear-gradient(135deg, #1a1a2e, #16213e); font-family:sans-serif; color:white; overflow:hidden}
#game {display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh}
#top {width:90%; display:flex; justify-content:space-between; font-size:18px; font-weight:bold; margin-bottom:20px}
#arena {width:90%; height:300px; background:#0f0f23; border:3px solid orange; border-radius:20px; position:relative; overflow:hidden}
.enemy {width:60px; height:60px; background:red; border-radius:50%; position:absolute; cursor:pointer; box-shadow:0 0 20px red; animation:pulse 0.5s infinite}
@keyframes pulse {0%,100%{transform:scale(1)} 50%{transform:scale(1.1)}}
#btn {width:150px; height:150px; background:orange; border-radius:50%; border:none; font-size:22px; font-weight:bold; color:white; margin-top:30px; box-shadow:0 10px 30px rgba(255,165,0,0.5)}
#btn:active {transform:scale(0.9)}
#msg {margin-top:15px; font-size:16px; text-align:center}
</style>
</head>
<body>
<div id="game">
  <div id="top">
    <span>Level: <span id="level">1</span>/5</span>
    <span>Score: <span id="score">0</span></span>
    <span>Health: <span id="health">100</span></span>
  </div>
  <div id="arena"></div>
  <button id="btn">FIRE!</button>
  <div id="msg">Enemy को Tap करके मारो!</div>
</div>

<script>
let level = 1, score = 0, health = 100, enemies = 0, killed = 0;
const arena = document.getElementById('arena');
const levelEl = document.getElementById('level');
const scoreEl = document.getElementById('score');
const healthEl = document.getElementById('health');
const msg = document.getElementById('msg');
const btn = document.getElementById('btn');

function startLevel() {
  arena.innerHTML = '';
  enemies = level * 3; // Level 1=3, Level 2=6 Enemy
  killed = 0;
  msg.innerHTML = `Level ${level} - ${enemies} Enemy मारो!`;
  spawnEnemy();
}

function spawnEnemy() {
  if(killed >= enemies) {
    if(level < 5) {
      level++; levelEl.innerHTML = level;
      msg.innerHTML = `Level ${level-1} Complete! Next Level...`;
      setTimeout(startLevel, 2000);
    } else {
      msg.innerHTML = `🎉 Game Complete! Final Score: ${score}`;
      btn.disabled = true;
    }
    return;
  }
  
  let e = document.createElement('div');
  e.className = 'enemy';
  e.style.left = Math.random() * (arena.offsetWidth - 60) + 'px';
  e.style.top = Math.random() * (arena.offsetHeight - 60) + 'px';
  e.onclick = () => {
    score += 10 * level;
    killed++;
    scoreEl.innerHTML = score;
    e.remove();
    setTimeout(spawnEnemy, 800);
  };
  arena.appendChild(e);
  
  setTimeout(() => {
    if(e.parentNode) {
      e.remove();
      health -= 10;
      healthEl.innerHTML = health;
      if(health <= 0) {
        msg.innerHTML = `Game Over! Score: ${score}`;
        btn.disabled = true;
      } else {
        spawnEnemy();
      }
    }
  }, 3000 - level*300); // Level बढ़ेगा तो Enemy जल्दी गायब
}

btn.onclick = () => {
  if(level == 1 && killed == 0) startLevel();
}
</script>
</body>
</html>
