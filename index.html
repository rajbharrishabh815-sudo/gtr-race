<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nissan GTR R34 Race</title>
<style>
* { margin: 0; padding: 0; }
body { background: #2c3e50; overflow: hidden; }
canvas { display: block; background: #34495e; }
#controls {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
}
button {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.3);
  color: white;
  font-size: 30px;
  font-weight: bold;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
  <button id="left">◀</button>
  <button id="right">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let carX = canvas.width / 2;
let carY = canvas.height - 100;
let speed = 3;

// Car बनाने का Function
function drawCar(x, y) {
  ctx.fillStyle = 'red';
  ctx.fillRect(x-25, y-50, 50, 100); // Body
  ctx.fillStyle = 'black';
  ctx.fillRect(x-20, y-40, 15, 20); // Window
  ctx.fillRect(x+5, y-40, 15, 20); // Window
  ctx.fillStyle = 'gray';
  ctx.fillRect(x-30, y-20, 10, 40); // Wheel
  ctx.fillRect(x+20, y-20, 10, 40); // Wheel
}

// Game Loop - यही Start करता है
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Road बनाओ
  ctx.fillStyle = '#7f8c8d';
  ctx.fillRect(canvas.width/2 - 100, 0, 200, canvas.height);
  ctx.fillStyle = 'white';
  ctx.fillRect(canvas.width/2 - 5, 0, 10, canvas.height);
  
  drawCar(carX, carY);
  requestAnimationFrame(gameLoop);
}

gameLoop(); // Game Start!

// Button Controls
document.getElementById('left').ontouchstart = () => carX -= 20;
document.getElementById('right').ontouchstart = () => carX += 20;
</script>
</body>
</html>
