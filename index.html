<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Runner Game</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#87CEEB;
}
canvas{
    display:block;
    margin:auto;
    background:#90EE90;
}
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x:100,
    y:300,
    w:40,
    h:40,
    dy:0,
    jumping:false
};

let obstacles = [];
let score = 0;
let gameOver = false;

document.addEventListener("keydown", e=>{
    if(e.code==="Space" && !player.jumping){
        player.dy = -12;
        player.jumping = true;
    }
});

function spawnObstacle(){
    obstacles.push({
        x:800,
        y:320,
        w:30,
        h:50
    });
}

setInterval(spawnObstacle,1500);

function update(){
    if(gameOver) return;

    player.dy += 0.6;
    player.y += player.dy;

    if(player.y >= 300){
        player.y = 300;
        player.dy = 0;
        player.jumping = false;
    }

    obstacles.forEach(ob=>{
        ob.x -= 6;

        if(
            player.x < ob.x + ob.w &&
            player.x + player.w > ob.x &&
            player.y < ob.y + ob.h &&
            player.y + player.h > ob.y
        ){
            gameOver = true;
        }
    });

    obstacles = obstacles.filter(ob=>ob.x>-50);

    score++;
}

function draw(){
    ctx.clearRect(0,0,800,400);

    ctx.fillStyle="brown";
    ctx.fillRect(0,350,800,50);

    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="red";
    obstacles.forEach(ob=>{
        ctx.fillRect(ob.x,ob.y,ob.w,ob.h);
    });

    ctx.fillStyle="black";
    ctx.font="24px Arial";
    ctx.fillText("Score: "+score,20,40);

    if(gameOver){
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",280,200);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
